<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .container {
            background-color: black;
            height: 600px;
            /* width: 100%; */
            margin: 20px ;
            padding: 25px;
        }

        .container div {
            background-color: red;
            border: 1px solid black;
            height: 100px;
            width: 150px;
            margin: 10px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .one {
            /* background-color: blue; */
            position: relative;
            top: 0;

        }

        .two {
            /* background-color: green; */
            position: relative;
            top: -110px;
            left: 1100px;
        }

        .three {
            position: relative;
            left: 550px;
        }

        .four {
            position: relative;
            top: 110px;
            left: 1100px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="one">box 1</div>
        <div class="two">box 2</div>
        <div class="three">box 3</div>
        <div class="four">box 4</div>
        <div class="five">box 5</div>
    </div>
</body>
</html>
